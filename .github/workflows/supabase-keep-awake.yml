name: Supabase keep-awake

on:
  schedule:
    # Runs every 3 days at 04:17 UTC.
    # Scheduled workflows only run from the repository default branch.
    - cron: "17 4 */3 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "Missing GitHub secret: SUPABASE_URL"
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Missing GitHub secret: SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Ping Supabase REST API
        shell: bash
        run: |
          set -euo pipefail

          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"

          # Prefer a tiny read from profiles. If RLS blocks it, any authenticated REST
          # response still wakes the project, so accept common non-network HTTP statuses.
          HTTP_STATUS=$(curl -sS -o /tmp/supabase_keep_awake_response.txt -w "%{http_code}" \
            --connect-timeout 15 \
            --max-time 45 \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1")

          echo "Supabase ping HTTP status: ${HTTP_STATUS}"

          if [[ "${HTTP_STATUS}" =~ ^2|3|4 ]]; then
            echo "Supabase keep-awake ping completed."
            exit 0
          fi

          echo "Unexpected Supabase response:"
          cat /tmp/supabase_keep_awake_response.txt || true
          exit 1
